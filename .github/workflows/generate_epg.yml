name: Generate Master EPG Pipeline

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/generate_epg.yml'
      - 'epgs/custom.channels.xml'
      - 'generate_epg.py'

permissions:
  contents: write

concurrency:
  group: git-write-lock
  cancel-in-progress: false

jobs:
  build-epg:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          mkdir -p epgs

      # ========================================================
      # LANGKAH 1: Jalankan Fungsi 1 (iptv-org/epg)
      # ========================================================
      - name: Clone IPTV-ORG EPG tool
        run: git clone --depth 1 https://github.com/iptv-org/epg.git epg-tool

      - name: Install Node dependencies
        working-directory: epg-tool
        run: npm ci

      - name: Copy custom channels file
        run: cp epgs/custom.channels.xml epg-tool/sites/custom.channels.xml

      - name: Generate Base EPG (Fungsi 1)
        working-directory: epg-tool
        run: |
          npm run grab -- \
            --channels=sites/custom.channels.xml \
            --output=../epgs/guide.xml \
            --maxConnections=8

      - name: Backup pre-merge guide.xml
        run: cp epgs/guide.xml epgs/guide.xml.bak

      # ========================================================
      # LANGKAH 2: Jalankan Fungsi 2 (generate_epg.py)
      # ========================================================
      - name: Run EPG Scraper & Merger (Fungsi 2)
        id: merge_epg
        env:
          M3U_URL: ${{ secrets.M3U_URL }}
        run: python generate_epg.py

      - name: Restore backup on merge failure
        if: failure() && steps.merge_epg.outcome == 'failure'
        run: |
          echo "generate_epg.py failed sanity check or crashed. Restoring pre-merge guide.xml."
          mv epgs/guide.xml.bak epgs/guide.xml

      # ========================================================
      # LANGKAH 3: Validasi XML & Index channels.txt
      # ========================================================
      - name: Verify Unified EPG Output Is Well-Formed
        run: |
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          import sys

          path = "epgs/guide.xml"
          try:
              root = ET.parse(path).getroot()
          except Exception as e:
              print(f"FATAL: guide.xml is not well-formed XML: {e}")
              sys.exit(1)

          channels = len(root.findall("channel"))
          programmes = len(root.findall("programme"))
          print(f"==== Unified EPG Stats ====")
          print(f"Total Channels: {channels}")
          print(f"Total Programmes: {programmes}")

          if channels == 0 or programmes == 0:
              print("FATAL: guide.xml has zero channels or programmes. Refusing to commit.")
              sys.exit(1)
          PY

      - name: Generate channels.txt Index
        run: |
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          from pathlib import Path
          import sys

          src = Path("epgs/custom.channels.xml")
          out = Path("epgs/channels.txt")

          try:
              tree = ET.parse(src)
          except Exception as e:
              print(f"FATAL: failed to parse {src}: {e}")
              sys.exit(1)

          root = tree.getroot()
          entries = []
          for channel in root.findall("channel"):
              tvg_id = channel.attrib.get("xmltv_id", "").strip()
              name = (channel.text or "").strip()
              if tvg_id:
                  entries.append(f'{tvg_id} "{name}"')

          entries = sorted(set(entries), key=lambda x: x.lower())
          out.write_text("\n".join(entries), encoding="utf-8")
          print(f"Generated channels.txt index with {len(entries)} items.")
          PY

      - name: Cleanup backup file
        if: success()
        run: rm -f epgs/guide.xml.bak

      # ========================================================
      # LANGKAH 4: Push Bersih Tanpa Merusak Commit Utama
      # ========================================================
      - name: Commit and Push (Keep History Clean)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A epgs/

          if git diff-index --quiet HEAD --; then
            echo "No changes detected. Skipping commit."
            exit 0
          fi

          LAST_AUTHOR=$(git log -1 --format='%ae')
          BOT_EMAIL="41898282+github-actions[bot]@users.noreply.github.com"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          IS_AMEND=false

          if [ "$LAST_AUTHOR" = "$BOT_EMAIL" ]; then
            echo "Last commit by bot. Amending..."
            git commit --amend --no-edit --date="$TIMESTAMP"
            IS_AMEND=true
          else
            echo "Last commit by user. Creating new commit..."
            git commit -m "Auto-Update $TIMESTAMP"
          fi

          for i in 1 2 3; do
            echo "Syncing with remote (Attempt $i/3)..."
            git fetch origin main

            # NOTE: -Xtheirs sengaja dipilih supaya commit manual user di epgs/
            # tidak ditimpa oleh hasil auto-generate kalau terjadi conflict.
            if ! git rebase origin/main -Xtheirs; then
              echo "Rebase failed. Aborting."
              git rebase --abort
              exit 1
            fi

            echo "Pushing changes..."
            if [ "$IS_AMEND" = true ]; then
              PUSH_CMD="git push origin main --force-with-lease"
            else
              PUSH_CMD="git push origin main"
            fi

            if $PUSH_CMD; then
              echo "Push berhasil."
              exit 0
            fi

            echo "Push ditolak, mencoba rebase ulang di iterasi berikutnya..."
            sleep 2
          done

          echo "Push gagal setelah 3x percobaan."
          exit 1