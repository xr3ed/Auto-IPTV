name: Generate Live Events

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/generate_liveevents.yml'
      - 'generate_liveevents.py'

permissions:
  contents: write

concurrency:
  group: git-write-lock
  cancel-in-progress: false

jobs:
  build-playlists:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          mkdir -p playlists

      - name: Generate Live Events
        env:
          GCIKAR_URL: ${{ vars.GCIKAR_URL }}
        run: python generate_liveevents.py

      - name: Commit and Push (Keep History Clean)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A playlists/

          if git diff-index --quiet HEAD --; then
            echo "No changes detected. Skipping commit."
            exit 0
          fi

          LAST_AUTHOR=$(git log -1 --format='%ae')
          BOT_EMAIL="41898282+github-actions[bot]@users.noreply.github.com"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          IS_AMEND=false

          if [ "$LAST_AUTHOR" = "$BOT_EMAIL" ]; then
            echo "Last commit by bot. Amending..."
            git commit --amend -m "chore: auto sync gcikar playlist ($TIMESTAMP)" --date="$TIMESTAMP"
            IS_AMEND=true
          else
            echo "Last commit by user. Creating new commit..."
            git commit -m "chore: auto sync gcikar playlist ($TIMESTAMP)"
          fi

          for i in 1 2 3; do
            echo "Syncing with remote (Attempt $i/3)..."
            git fetch origin main

            if ! git rebase origin/main -Xtheirs; then
              echo "Rebase failed. Aborting."
              git rebase --abort
              exit 1
            fi

            echo "Pushing changes..."
            if [ "$IS_AMEND" = true ]; then
              PUSH_CMD="git push origin main --force-with-lease"
            else
              PUSH_CMD="git push origin main"
            fi

            if $PUSH_CMD; then
              echo "Push berhasil."
              exit 0
            fi

            echo "Push ditolak, mencoba rebase ulang di iterasi berikutnya..."
            sleep 2
          done

          echo "Push gagal setelah 3x percobaan."
          exit 1